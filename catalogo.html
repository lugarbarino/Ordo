<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--p:#285576;--cel:#e8f0fc;--borde:#dde3ed;--txt:#1e2a3a;--sub:#6b7a90;--bg:#f5f6f8}
    body{font-family:'Inter',sans-serif;color:var(--txt);background:var(--bg);min-height:100vh}

    /* HEADER */
    .header{background:white;padding:24px 0 0;display:flex;justify-content:center}
    .header-logo{width:250px;height:110px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .header-logo img{width:100%;height:100%;object-fit:contain}

    /* HERO */
    .hero{margin:20px auto;border-radius:14px;overflow:hidden;position:relative;width:1000px;max-width:calc(100% - 48px);height:450px;display:flex;align-items:flex-end;padding:44px 56px}
    .hero-bg{position:absolute;inset:0;background:var(--p);background-size:cover;background-position:center}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(110deg,rgba(15,38,62,0.88) 0%,rgba(25,60,95,0.65) 55%,rgba(25,60,95,0.35) 100%)}
    .hero-content{position:relative;z-index:1;max-width:560px}
    .hero-title{font-size:2.5rem;font-weight:900;color:white;line-height:1.12;margin-bottom:14px}
    .hero-desc{font-size:.93rem;color:rgba(255,255,255,.8);line-height:1.65;max-width:460px}

    /* FILTER */
    .filter-bar{background:white;border-bottom:1px solid var(--borde);padding:0 40px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
    .pill-group{display:flex;align-items:center;background:#f1f1f1;border-radius:40px;padding:4px;gap:2px;overflow-x:auto;flex-shrink:1;min-width:0}
    .pill-group::-webkit-scrollbar{height:0}
    .cat-pill{padding:8px 20px;border-radius:30px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:#333;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .15s;flex-shrink:0}
    .cat-pill.activo{background:var(--p);color:white;box-shadow:0 2px 8px rgba(0,0,0,.18)}
    .search-box{display:flex;align-items:center;gap:8px;border:1.5px solid var(--borde);border-radius:10px;padding:0 14px;height:42px;min-width:200px;flex-shrink:0;margin-left:auto;transition:border-color .2s}
    .search-box:focus-within{border-color:var(--p)}
    .search-box input{border:none;outline:none;font-size:.88rem;font-family:'Inter',sans-serif;width:100%;color:var(--txt)}
    .search-box input::placeholder{color:#aab}
    .contador{font-size:.8rem;color:var(--sub);white-space:nowrap;flex-shrink:0}

    /* GRID */
    .contenedor{padding:28px 40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}

    /* CARD */
    .tarjeta{background:white;border-radius:12px;border:1px solid var(--borde);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
    .tarjeta:hover{box-shadow:0 8px 28px rgba(0,0,0,.1);transform:translateY(-2px)}
    .tarjeta-img{width:100%;height:185px;background:#f7f9fc;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;border-bottom:1px solid #eef1f6;cursor:zoom-in}
    .tarjeta-img .img-prod{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:14px;display:block;z-index:1}
    .tarjeta-codigo{position:absolute;top:10px;right:10px;font-size:.68rem;color:#444;font-family:monospace;font-weight:700;background:rgba(220,228,238,.92);padding:3px 8px;border-radius:5px;z-index:2;letter-spacing:.3px}
    .tarjeta-body{padding:16px 16px 18px;display:flex;flex-direction:column;flex:1}
    .tarjeta-cat{font-size:.62rem;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;align-self:flex-start;background:var(--cel);color:var(--p);margin-bottom:8px}
    .tarjeta-nombre{font-size:.88rem;font-weight:700;color:var(--txt);line-height:1.4;text-transform:uppercase;margin-bottom:6px}
    .tarjeta-desc{font-size:.81rem;color:var(--sub);line-height:1.5;flex:1;margin-bottom:14px}
    .tarjeta-precio{font-size:.86rem;font-weight:700;color:var(--p);margin-bottom:12px}
    .tarjeta-precio.consultar{color:var(--sub);font-weight:400;font-size:.8rem}
    .btn-add{width:100%;padding:10px;border:1.5px solid #ccd6e0;border-radius:8px;background:white;color:var(--txt);font-weight:600;font-size:.84rem;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s,border-color .15s;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-add:hover{background:#f0f5fb;border-color:var(--p)}
    .btn-add.added{background:#f0f0f0;border-color:#e0e0e0;color:var(--sub);cursor:default}

    /* MODAL FOTO */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.activo{display:flex}
    .modal-img-wrap{background:white;border-radius:16px;padding:16px;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative}
    .modal-img-wrap img{max-width:80vw;max-height:72vh;object-fit:contain;border-radius:8px}
    .modal-nombre{font-size:1rem;font-weight:700;text-align:center}
    .modal-cerrar{position:absolute;top:10px;right:14px;font-size:1.3rem;cursor:pointer;color:var(--sub);background:none;border:none}

    /* FAB */
    .carrito-fab{position:fixed;bottom:28px;right:28px;background:var(--p);color:white;border:none;border-radius:50px;padding:14px 22px;font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:50;display:none;align-items:center;gap:10px;font-family:'Inter',sans-serif;transition:transform .15s}
    .carrito-fab:hover{transform:scale(1.04)}
    .carrito-badge{background:white;color:var(--p);border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800}

    /* MODAL CARRITO */
    .modal-car{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
    .modal-car.activo{display:flex}
    .modal-car-box{background:white;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
    .modal-car-header{padding:20px 24px 16px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between}
    .modal-car-header h3{font-size:1.05rem;font-weight:800}
    .modal-car-body{flex:1;overflow-y:auto;padding:16px 24px}
    .modal-car-footer{padding:16px 24px;border-top:1px solid var(--borde);display:flex;flex-direction:column;gap:10px}
    .car-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--borde)}
    .car-item:last-child{border-bottom:none}
    .car-item-nombre{flex:1;font-size:.9rem;font-weight:600}
    .car-item-cat{font-size:.75rem;color:var(--sub)}
    .car-qty{display:flex;align-items:center;gap:8px}
    .car-qty button{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--borde);background:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--p)}
    .car-qty button:hover{background:var(--cel)}
    .car-qty span{font-weight:700;min-width:20px;text-align:center}
    .car-del{background:none;border:none;cursor:pointer;color:var(--sub);font-size:1rem;padding:4px}
    .car-del:hover{color:#c0392b}
    .form-ped label{display:block;font-size:.83rem;font-weight:600;margin-bottom:4px;margin-top:12px}
    .form-ped input{width:100%;padding:9px 13px;border:1.5px solid var(--borde);border-radius:8px;font-size:.9rem;outline:none;font-family:'Inter',sans-serif}
    .form-ped input:focus{border-color:var(--p)}

    /* UTIL */
    .estado{text-align:center;padding:80px 20px;color:var(--sub)}
    .estado .icon{font-size:4rem;margin-bottom:16px}
    .estado h2{font-size:1.3rem;color:var(--txt);margin-bottom:8px}
    .footer-cat{text-align:center;padding:28px;color:var(--sub);font-size:.8rem;border-top:1px solid var(--borde);margin-top:16px}
    .footer-cat a{color:var(--p);text-decoration:none;font-weight:600}
    .spinner-wrap{display:flex;align-items:center;justify-content:center;height:300px}
    .spinner{width:40px;height:40px;border:4px solid var(--borde);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){
      .hero{margin:14px 16px;padding:32px 24px;min-height:220px}
      .hero-title{font-size:1.8rem}
      .filter-bar,.contenedor{padding-left:16px;padding-right:16px}
      .grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    }
    @media(max-width:480px){
      .grid{grid-template-columns:1fr 1fr;gap:12px}
      .tarjeta-img{height:150px}
    }
  </style>
</head>
<body>

<div class="spinner-wrap" id="spinnerWrap"><div class="spinner"></div></div>

<div class="estado" id="estadoError" style="display:none">
  <div class="icon">😕</div>
  <h2>Catálogo no encontrado</h2>
  <p>Revisá el link o pedile uno nuevo a la empresa.</p>
</div>

<div id="contenidoPrincipal" style="display:none">

  <!-- HEADER: logo + nombre centrados -->
  <div class="header">
    <div class="header-logo" id="headerLogo">🏥</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title" id="heroNombre">—</h1>
      <p class="hero-desc" id="heroDesc"></p>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="pill-group" id="pillGroup">
      <button class="cat-pill activo" data-cat="" onclick="seleccionarCat('')">Todas</button>
      <div id="pillsWrap" style="display:contents"></div>
    </div>
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.85-3.85zm-5.242 1.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" fill="#aab"/></svg>
      <input type="text" id="buscar" placeholder="Buscar productos..." oninput="filtrar()"/>
    </div>
    <span class="contador" id="contador"></span>
  </div>

  <!-- GRID -->
  <div class="contenedor">
    <div id="estadoVacio" class="estado" style="display:none">
      <div class="icon">📦</div><h2>No hay productos todavía</h2><p>Volvé a consultar pronto.</p>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="footer-cat">Catálogo creado con <a href="index.html">Ordo</a></div>
</div>

<!-- FAB -->
<button class="carrito-fab" id="carritoFab" onclick="abrirCarrito()">
  🛒 Ver presupuesto <span class="carrito-badge" id="carritoBadge">0</span>
</button>

<!-- MODAL CARRITO -->
<div class="modal-car" id="modalCarrito" onclick="if(event.target===this)cerrarCarrito()">
  <div class="modal-car-box">
    <div class="modal-car-header">
      <h3>📋 Tu pedido de presupuesto</h3>
      <button onclick="cerrarCarrito()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#999">✕</button>
    </div>
    <div class="modal-car-body" id="carritoBody"></div>
    <div class="modal-car-footer" id="carritoFooter"></div>
  </div>
</div>

<!-- MODAL FOTO -->
<div class="modal-overlay" id="modalFoto" onclick="if(event.target===this)document.getElementById('modalFoto').classList.remove('activo')">
  <div class="modal-img-wrap">
    <button class="modal-cerrar" onclick="document.getElementById('modalFoto').classList.remove('activo')">✕</button>
    <img id="modalFotoImg" src="" alt=""/>
    <div class="modal-nombre" id="modalFotoNombre"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://mfbsymubromhwljotrca.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mYnN5bXVicm9taHdsam90cmNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODE3NTMsImV4cCI6MjA5MDU1Nzc1M30.Y7pbjwByvOcSHroKSrCDyXZnmjSfxCSavUflvZJCq1U'
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

  let TODOS = [], EMPRESA_DATA = null, CARRITO = [], CAT_ACTIVA = ''

  async function init() {
    const slug = new URLSearchParams(location.search).get('slug')
    if (!slug) { mostrarError(); return }

    const { data: empresa } = await db.from('empresas').select('*').eq('slug', slug).single()
    if (!empresa) { mostrarError(); return }
    EMPRESA_DATA = empresa

    // Color de marca
    const color = empresa.color || '#285576'
    document.documentElement.style.setProperty('--p', color)

    // Header
    document.title = empresa.nombre + ' — Catálogo'
    document.getElementById('headerNombre').textContent = empresa.nombre
    if (empresa.descripcion) document.getElementById('headerSub').textContent = empresa.descripcion
    if (empresa.logo_url) {
      document.getElementById('headerLogo').innerHTML =
        `<img src="${empresa.logo_url}" alt="${empresa.nombre}" onerror="this.parentElement.textContent='🏥'"/>`
    }

    // Hero
    document.getElementById('heroNombre').textContent = empresa.nombre
    if (empresa.descripcion) document.getElementById('heroDesc').textContent = empresa.descripcion
    const heroBg = document.getElementById('heroBg')
    heroBg.style.background = color
    if (empresa.banner_url) {
      heroBg.style.backgroundImage = `url('${empresa.banner_url.replace(/'/g,"\\'")}')`
      heroBg.style.backgroundSize = 'cover'
      heroBg.style.backgroundPosition = 'center'
    }

    // Productos
    const { data: productos } = await db.from('productos').select('*')
      .eq('empresa_id', empresa.id).order('posicion', { ascending: true })
    TODOS = productos || []

    // Pills de categorías
    const cats = [...new Set(TODOS.map(p => p.categoria).filter(Boolean))].sort()
    const wrap = document.getElementById('pillsWrap')
    cats.forEach(c => {
      const btn = document.createElement('button')
      btn.className = 'cat-pill'
      btn.dataset.cat = c
      btn.textContent = c
      btn.onclick = () => seleccionarCat(c)
      wrap.appendChild(btn)
    })

    document.getElementById('spinnerWrap').style.display = 'none'
    document.getElementById('contenidoPrincipal').style.display = 'block'
    filtrar()
  }

  function seleccionarCat(cat) {
    CAT_ACTIVA = cat
    document.querySelectorAll('.cat-pill').forEach(p =>
      p.classList.toggle('activo', p.dataset.cat === cat))
    filtrar()
  }

  function filtrar() {
    const q = document.getElementById('buscar').value.toLowerCase()
    const res = TODOS.filter(p =>
      (!CAT_ACTIVA || p.categoria === CAT_ACTIVA) &&
      (!q || (p.nombre||'').toLowerCase().includes(q) ||
             (p.descripcion||'').toLowerCase().includes(q) ||
             (p.codigo||'').toLowerCase().includes(q))
    )
    renderizar(res)
    document.getElementById('contador').textContent =
      `${res.length} producto${res.length !== 1 ? 's' : ''}`
  }

  function renderizar(lista) {
    const grid  = document.getElementById('grid')
    const empty = document.getElementById('estadoVacio')
    grid.innerHTML = ''
    if (!lista.length) { empty.style.display = 'block'; return }
    empty.style.display = 'none'

    lista.forEach(p => {
      const eu  = (p.imagen_url||'').replace(/"/g,'&quot;')
      const en  = (p.nombre||'').replace(/"/g,'&quot;').replace(/'/g,"\\'")
      const ejs = (p.imagen_url||'').replace(/'/g,"\\'")
      const ecat = (p.categoria||'').replace(/'/g,"\\'")
      const precio = p.precio
        ? (isNaN(p.precio) ? p.precio : `$${Number(p.precio).toLocaleString('es-AR')}`)
        : null
      const enCar = CARRITO.some(x => x.id === p.id)

      const imgHTML = p.imagen_url
        ? `<div class="tarjeta-img" onclick="abrirFoto('${ejs}','${en}')">
             <img class="img-prod" src="${eu}" alt="${en}" onerror="this.style.display='none'">
             ${p.codigo ? `<span class="tarjeta-codigo">${p.codigo}</span>` : ''}
           </div>`
        : `<div class="tarjeta-img">
             <span style="font-size:2.4rem;opacity:.25">◻</span>
             ${p.codigo ? `<span class="tarjeta-codigo">${p.codigo}</span>` : ''}
           </div>`

      const card = document.createElement('div')
      card.className = 'tarjeta'
      card.innerHTML = `
        ${imgHTML}
        <div class="tarjeta-body">
          ${p.categoria ? `<span class="tarjeta-cat">${p.categoria}</span>` : ''}
          <div class="tarjeta-nombre">${p.nombre}</div>
          <div class="tarjeta-desc">${p.descripcion || ''}</div>
          ${precio ? `<div class="tarjeta-precio">${precio}</div>` : ''}
          <button id="btn-car-${p.id}" class="btn-add${enCar?' added':''}"
            onclick="agregarCarrito('${p.id}','${en}','${ecat}')">
            ${enCar ? '✓ Agregado' : '+ Presupuestá'}
          </button>
        </div>`
      grid.appendChild(card)
    })
  }

  function abrirFoto(url, nombre) {
    document.getElementById('modalFotoImg').src = url
    document.getElementById('modalFotoNombre').textContent = nombre
    document.getElementById('modalFoto').classList.add('activo')
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('modalFoto').classList.remove('activo')
      cerrarCarrito()
    }
  })

  function mostrarError() {
    document.getElementById('spinnerWrap').style.display = 'none'
    document.getElementById('estadoError').style.display = 'block'
  }

  // ── CARRITO ──────────────────────────────────────────────
  function agregarCarrito(id, nombre, categoria) {
    const existe = CARRITO.find(x => x.id === id)
    if (existe) { existe.cantidad++ } else { CARRITO.push({id, nombre, categoria, cantidad:1}) }
    actualizarFab()
    const btn = document.getElementById('btn-car-' + id)
    if (btn) { btn.classList.add('added'); btn.textContent = '✓ Agregado' }
  }

  function quitarCarrito(id) {
    CARRITO = CARRITO.filter(x => x.id !== id)
    actualizarFab(); renderCarrito()
    const btn = document.getElementById('btn-car-' + id)
    if (btn) { btn.classList.remove('added'); btn.textContent = '+ Presupuestá' }
  }

  function cambiarCantidad(id, delta) {
    const item = CARRITO.find(x => x.id === id)
    if (item) { item.cantidad = Math.max(1, item.cantidad + delta); renderCarrito() }
  }

  function actualizarFab() {
    const total = CARRITO.reduce((s,x) => s + x.cantidad, 0)
    document.getElementById('carritoFab').style.display = total > 0 ? 'flex' : 'none'
    document.getElementById('carritoBadge').textContent = total
  }

  function abrirCarrito()  { renderCarrito(); document.getElementById('modalCarrito').classList.add('activo') }
  function cerrarCarrito() { document.getElementById('modalCarrito').classList.remove('activo') }

  function renderCarrito() {
    const body   = document.getElementById('carritoBody')
    const footer = document.getElementById('carritoFooter')
    if (!CARRITO.length) {
      body.innerHTML = '<div style="text-align:center;padding:40px;color:#999">Agregá productos desde el catálogo.</div>'
      footer.innerHTML = ''; return
    }
    body.innerHTML = CARRITO.map(x => `
      <div class="car-item">
        <div style="flex:1">
          <div class="car-item-nombre">${x.nombre}</div>
          ${x.categoria ? `<div class="car-item-cat">${x.categoria}</div>` : ''}
        </div>
        <div class="car-qty">
          <button onclick="cambiarCantidad('${x.id}',-1)">−</button>
          <span>${x.cantidad}</span>
          <button onclick="cambiarCantidad('${x.id}',1)">+</button>
        </div>
        <button class="car-del" onclick="quitarCarrito('${x.id}')">🗑️</button>
      </div>`).join('')

    footer.innerHTML = `
      <div class="form-ped">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label>Nombre *</label><input id="pedNombre" placeholder="Tu nombre"/></div>
          <div><label>Teléfono *</label><input id="pedTel" placeholder="Tu teléfono"/></div>
        </div>
        <label>Email</label><input id="pedEmail" type="email" placeholder="tu@email.com"/>
        <label>Empresa / Institución</label><input id="pedEmpresa" placeholder="Opcional"/>
        <label>Mensaje</label><input id="pedMensaje" placeholder="Opcional"/>
      </div>
      <button onclick="enviarPedido()" style="width:100%;padding:13px;background:var(--p);color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:4px;font-family:'Inter',sans-serif">
        📩 Enviar pedido de presupuesto
      </button>`
  }

  async function enviarPedido() {
    const nombre = document.getElementById('pedNombre').value.trim()
    const tel    = document.getElementById('pedTel').value.trim()
    if (!nombre || !tel) { alert('Nombre y teléfono son obligatorios'); return }

    const pedido = {
      empresa_id: EMPRESA_DATA.id, nombre_cliente: nombre, telefono_cliente: tel,
      email_cliente:   document.getElementById('pedEmail').value.trim(),
      empresa_cliente: document.getElementById('pedEmpresa').value.trim(),
      mensaje:         document.getElementById('pedMensaje').value.trim(),
      productos: CARRITO.map(x => ({id:x.id, nombre:x.nombre, cantidad:x.cantidad})),
    }
    const { error } = await db.from('pedidos').insert(pedido)
    if (error) { alert('Error al enviar. Intentá de nuevo.'); return }

    const lista = CARRITO.map(x => `• ${x.cantidad}x ${x.nombre}`).join('\n')
    const texto = `Hola! Soy ${nombre} (${tel}). Solicito presupuesto de:\n\n${lista}${pedido.mensaje?'\n\nMensaje: '+pedido.mensaje:''}`

    if (EMPRESA_DATA.whatsapp)
      window.open(`https://wa.me/${EMPRESA_DATA.whatsapp}?text=${encodeURIComponent(texto)}`, '_blank')
    if (EMPRESA_DATA.email_contacto)
      window.open(`mailto:${EMPRESA_DATA.email_contacto}?subject=${encodeURIComponent('Solicitud de presupuesto de '+nombre)}&body=${encodeURIComponent(texto)}`, '_blank')

    CARRITO = []; actualizarFab(); cerrarCarrito()
    alert('✅ ¡Pedido enviado! Nos pondremos en contacto pronto.')
  }

  init()
</script>
</body>
</html>
