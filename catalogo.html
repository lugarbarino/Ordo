<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primario:#285576;--celeste:#e8f0fc;--borde:#dde3ed;
      --texto:#1e2a3a;--cat-text:#36384e;--suave:#6b7a90;
      --verde:#1a8f5a;--bg:#f8f8f8;
    }
    body{font-family:'Inter',sans-serif;color:var(--texto);background:var(--bg);min-height:100vh}

    /* ── LOGO SOBRE HERO ────────────────────── */
    .logo-wrap{display:flex;justify-content:center;align-items:center;padding:28px 0 0}
    .logo-img{width:72px;height:72px;border-radius:14px;background:white;display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12)}
    .logo-img img{width:100%;height:100%;object-fit:contain;border-radius:12px}

    /* ── HERO ───────────────────────────────── */
    .hero{margin:20px 48px;border-radius:16px;overflow:hidden;position:relative;min-height:300px;display:flex;align-items:flex-end;padding:52px 64px}
    .hero-bg{position:absolute;inset:0;background:var(--primario);background-size:cover;background-position:center}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(120deg,rgba(15,40,65,0.92) 0%,rgba(30,70,100,0.72) 60%,rgba(30,70,100,0.45) 100%);z-index:1}
    .hero-content{position:relative;z-index:2;max-width:580px}
    .hero-label{font-size:.7rem;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
    .hero-title{font-size:2.6rem;font-weight:900;color:white;line-height:1.12;margin-bottom:16px;text-wrap:balance}
    .hero-desc{font-size:.95rem;color:rgba(255,255,255,.78);line-height:1.7;max-width:480px}

    /* ── FILTER BAR ─────────────────────────── */
    .filter-bar{background:white;border-bottom:1px solid var(--borde);padding:0 48px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
    .pill-group{display:flex;align-items:center;background:#f1f1f1;border-radius:40px;padding:4px;gap:2px;overflow-x:auto;flex-shrink:0;max-width:60vw}
    .pill-group::-webkit-scrollbar{height:0}
    .cat-pill{padding:7px 20px;border-radius:30px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--cat-text);white-space:nowrap;font-family:'Inter',sans-serif;transition:background .15s,color .15s,box-shadow .15s;flex-shrink:0}
    .cat-pill:hover{background:rgba(255,255,255,.7)}
    .cat-pill.activo{background:var(--primario);color:white;box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .search-wrap{display:flex;align-items:center;gap:8px;border:1.5px solid var(--borde);border-radius:10px;padding:0 14px;margin-left:auto;flex-shrink:0;height:40px;min-width:200px;transition:border-color .2s}
    .search-wrap:focus-within{border-color:var(--primario)}
    .search-wrap input{border:none;outline:none;font-size:.87rem;font-family:'Inter',sans-serif;width:100%;background:transparent;color:var(--texto)}
    .search-wrap input::placeholder{color:#aab}
    .contador{font-size:.8rem;color:var(--suave);white-space:nowrap;flex-shrink:0}

    /* ── GRID ───────────────────────────────── */
    .contenedor{padding:32px 48px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}

    /* ── TARJETA ────────────────────────────── */
    .tarjeta{background:white;border-radius:14px;border:1px solid var(--borde);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .25s,transform .25s}
    .tarjeta:hover{box-shadow:0 12px 36px rgba(0,0,0,.1);transform:translateY(-3px)}

    .tarjeta-img{width:100%;height:190px;background:#f7f9fc;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;border-bottom:1px solid #eef1f6;cursor:zoom-in}
    .tarjeta-img .img-prod{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:16px;display:block;z-index:1}
    .tarjeta-codigo{position:absolute;top:10px;right:10px;font-size:.68rem;color:#444;font-family:monospace;background:rgba(220,225,235,.9);padding:3px 8px;border-radius:5px;z-index:2;letter-spacing:.4px;font-weight:600}

    .tarjeta-body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
    .tarjeta-cat{display:inline-block;font-size:.65rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;align-self:flex-start;background:var(--celeste);color:var(--primario);margin-bottom:9px}
    .tarjeta-nombre{font-size:.88rem;font-weight:700;color:var(--texto);line-height:1.4;text-transform:uppercase;margin-bottom:6px;letter-spacing:.2px}
    .tarjeta-desc{font-size:.82rem;color:var(--suave);line-height:1.55;flex:1;margin-bottom:14px}
    .tarjeta-precio{font-size:.87rem;font-weight:700;color:var(--primario);margin-bottom:12px}
    .tarjeta-precio.consultar{color:var(--suave);font-weight:500;font-size:.8rem}

    .btn-add{width:100%;padding:10px 12px;border:2px solid var(--primario);border-radius:8px;background:white;color:var(--cat-text);font-weight:700;font-size:.82rem;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-add:hover{background:var(--celeste);box-shadow:0 2px 8px rgba(40,85,118,.15)}
    .btn-add.added{background:#f0f0f0;border-color:#e0e0e0;color:var(--suave);cursor:default;box-shadow:none}

    /* ── MODAL FOTO ─────────────────────────── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.activo{display:flex}
    .modal-img-wrap{background:white;border-radius:16px;padding:16px;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative}
    .modal-img-wrap img{max-width:80vw;max-height:72vh;object-fit:contain;border-radius:8px}
    .modal-nombre{font-size:1rem;font-weight:700;text-align:center}
    .modal-cerrar{position:absolute;top:10px;right:14px;font-size:1.3rem;cursor:pointer;color:var(--suave);background:none;border:none}

    /* ── CARRITO FAB ────────────────────────── */
    .carrito-fab{position:fixed;bottom:28px;right:28px;background:var(--primario);color:white;border:none;border-radius:50px;padding:14px 24px;font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.25);z-index:50;display:none;align-items:center;gap:10px;transition:transform .15s;font-family:'Inter',sans-serif}
    .carrito-fab:hover{transform:scale(1.04)}
    .carrito-badge{background:white;color:var(--primario);border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800}

    /* ── MODAL CARRITO ──────────────────────── */
    .modal-car{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center}
    .modal-car.activo{display:flex}
    .modal-car-box{background:white;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
    .modal-car-header{padding:20px 24px 16px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between}
    .modal-car-header h3{font-size:1.05rem;font-weight:800}
    .modal-car-body{flex:1;overflow-y:auto;padding:16px 24px}
    .modal-car-footer{padding:16px 24px;border-top:1px solid var(--borde);display:flex;flex-direction:column;gap:10px}
    .car-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--borde)}
    .car-item:last-child{border-bottom:none}
    .car-item-nombre{flex:1;font-size:.9rem;font-weight:600}
    .car-item-cat{font-size:.75rem;color:var(--suave)}
    .car-qty{display:flex;align-items:center;gap:8px}
    .car-qty button{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--borde);background:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primario)}
    .car-qty button:hover{background:var(--celeste)}
    .car-qty span{font-weight:700;min-width:20px;text-align:center}
    .car-del{background:none;border:none;cursor:pointer;color:var(--suave);font-size:1rem;padding:4px}
    .car-del:hover{color:#c0392b}

    /* ── FORM PEDIDO ────────────────────────── */
    .form-ped label{display:block;font-size:.83rem;font-weight:600;margin-bottom:4px;margin-top:12px}
    .form-ped input,.form-ped textarea{width:100%;padding:9px 13px;border:1.5px solid var(--borde);border-radius:8px;font-size:.9rem;outline:none;font-family:'Inter',sans-serif}
    .form-ped input:focus,.form-ped textarea:focus{border-color:var(--primario)}

    /* ── ESTADOS ────────────────────────────── */
    .estado{text-align:center;padding:80px 20px;color:var(--suave)}
    .estado .icon{font-size:4rem;margin-bottom:16px}
    .estado h2{font-size:1.3rem;color:var(--texto);margin-bottom:8px}

    /* ── FOOTER ─────────────────────────────── */
    .footer-cat{text-align:center;padding:32px;color:var(--suave);font-size:.82rem;border-top:1px solid var(--borde);margin-top:24px}
    .footer-cat a{color:var(--primario);text-decoration:none;font-weight:600}

    /* ── SPINNER ────────────────────────────── */
    .spinner-wrap{display:flex;align-items:center;justify-content:center;height:300px}
    .spinner{width:40px;height:40px;border:4px solid var(--borde);border-top-color:var(--primario);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── RESPONSIVE ─────────────────────────── */
    @media(max-width:768px){
      .filter-bar,.contenedor{padding-left:20px;padding-right:20px}
      .logo-wrap{padding:20px 0 0}
      .logo-img{width:60px;height:60px}
      .hero{margin:12px 16px;padding:36px 28px;min-height:220px}
      .hero-title{font-size:1.9rem}
      .pill-group{max-width:70vw}
      .grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
    }
    @media(max-width:500px){
      .topbar{padding:0 16px}
      .hero{padding:28px 22px;min-height:180px}
      .hero-title{font-size:1.5rem}
      .filter-bar{padding:0 16px;gap:10px}
      .pill-group{max-width:55vw}
      .grid{grid-template-columns:1fr 1fr;gap:12px}
      .tarjeta-img{height:150px}
      .tarjeta-nombre{font-size:.8rem}
      .tarjeta-body{padding:12px 14px 14px}
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="spinner-wrap" id="spinnerWrap"><div class="spinner"></div></div>

<!-- ERROR -->
<div class="estado" id="estadoError" style="display:none">
  <div class="icon">😕</div>
  <h2>Catálogo no encontrado</h2>
  <p>Revisá el link o pedile uno nuevo a la empresa.</p>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="contenidoPrincipal" style="display:none">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-img" id="logoEmpresa">🏥</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-label">Catálogo de productos</div>
      <h1 class="hero-title" id="heroNombre">—</h1>
      <p class="hero-desc" id="heroDesc"></p>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBar">
    <div class="pill-group" id="pillGroup">
      <button class="cat-pill activo" data-cat="" onclick="seleccionarCat('')">Todas</button>
      <div id="pillsWrap" style="display:contents"></div>
    </div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.85-3.85zm-5.242 1.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" fill="#aab"/></svg>
      <input type="text" id="buscar" placeholder="Buscar productos..." oninput="filtrar()"/>
    </div>
    <span class="contador" id="contador"></span>
  </div>

  <!-- GRID -->
  <div class="contenedor">
    <div id="estadoVacio" class="estado" style="display:none">
      <div class="icon">📦</div>
      <h2>No hay productos todavía</h2>
      <p>Volvé a consultar pronto.</p>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="footer-cat">Catálogo creado con <a href="index.html">Ordo</a></div>
</div>

<!-- CARRITO FAB -->
<button class="carrito-fab" id="carritoFab" onclick="abrirCarrito()">
  🛒 Ver presupuesto <span class="carrito-badge" id="carritoBadge">0</span>
</button>

<!-- MODAL CARRITO -->
<div class="modal-car" id="modalCarrito" onclick="if(event.target===this)cerrarCarrito()">
  <div class="modal-car-box">
    <div class="modal-car-header">
      <h3>📋 Tu pedido de presupuesto</h3>
      <button onclick="cerrarCarrito()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#6b7a90">✕</button>
    </div>
    <div class="modal-car-body" id="carritoBody"></div>
    <div class="modal-car-footer" id="carritoFooter"></div>
  </div>
</div>

<!-- MODAL FOTO -->
<div class="modal-overlay" id="modalFoto" onclick="if(event.target===this)document.getElementById('modalFoto').classList.remove('activo')">
  <div class="modal-img-wrap">
    <button class="modal-cerrar" onclick="document.getElementById('modalFoto').classList.remove('activo')">✕</button>
    <img id="modalFotoImg" src="" alt=""/>
    <div class="modal-nombre" id="modalFotoNombre"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://mfbsymubromhwljotrca.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mYnN5bXVicm9taHdsam90cmNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODE3NTMsImV4cCI6MjA5MDU1Nzc1M30.Y7pbjwByvOcSHroKSrCDyXZnmjSfxCSavUflvZJCq1U'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  let TODOS = []
  let EMPRESA_DATA = null
  let CARRITO = []
  let CAT_ACTIVA = ''

  async function init() {
    const params = new URLSearchParams(location.search)
    const slug   = params.get('slug')
    if (!slug) { mostrarError(); return }

    const { data: empresa } = await db.from('empresas').select('*').eq('slug', slug).single()
    if (!empresa) { mostrarError(); return }
    EMPRESA_DATA = empresa

    const color = empresa.color || '#285576'
    document.documentElement.style.setProperty('--primario', color)
    document.getElementById('heroBg').style.background = color

    // Logo + título
    document.title = empresa.nombre + ' — Catálogo'
    if (empresa.logo_url) {
      document.getElementById('logoEmpresa').innerHTML = `<img src="${empresa.logo_url}" alt="${empresa.nombre}" onerror="this.parentElement.textContent='🏥'"/>`
    }

    // Hero
    document.getElementById('heroNombre').textContent = empresa.nombre
    if (empresa.descripcion) document.getElementById('heroDesc').textContent = empresa.descripcion
    if (empresa.logo_url) {
      document.getElementById('heroBg').style.backgroundImage = `url('${empresa.logo_url.replace(/'/g,"\\'")}')`
    }

    // Productos
    const { data: productos } = await db.from('productos').select('*').eq('empresa_id', empresa.id).order('posicion', { ascending: true })
    TODOS = productos || []

    // Pills de categorías
    const cats = [...new Set(TODOS.map(p => p.categoria).filter(Boolean))].sort()
    const pillsWrap = document.getElementById('pillsWrap')
    cats.forEach(c => {
      const btn = document.createElement('button')
      btn.className = 'cat-pill'
      btn.dataset.cat = c
      btn.textContent = c
      btn.onclick = () => seleccionarCat(c)
      pillsWrap.appendChild(btn)
    })

    document.getElementById('spinnerWrap').style.display    = 'none'
    document.getElementById('contenidoPrincipal').style.display = 'block'
    filtrar()
  }

  function seleccionarCat(cat) {
    CAT_ACTIVA = cat
    document.querySelectorAll('.cat-pill').forEach(p => {
      p.classList.toggle('activo', p.dataset.cat === cat)
    })
    filtrar()
  }

  function filtrar() {
    const q = document.getElementById('buscar').value.toLowerCase()
    const res = TODOS.filter(p =>
      (!CAT_ACTIVA || p.categoria === CAT_ACTIVA) &&
      (!q || (p.nombre||'').toLowerCase().includes(q) || (p.descripcion||'').toLowerCase().includes(q) || (p.codigo||'').toLowerCase().includes(q))
    )
    renderizar(res)
    document.getElementById('contador').textContent = `${res.length} producto${res.length !== 1 ? 's' : ''}`
  }

  function renderizar(lista) {
    const grid  = document.getElementById('grid')
    const empty = document.getElementById('estadoVacio')
    grid.innerHTML = ''
    if (!lista.length) { empty.style.display = 'block'; return }
    empty.style.display = 'none'

    lista.forEach(p => {
      const escapedUrl    = (p.imagen_url || '').replace(/"/g, '&quot;')
      const escapedNombre = (p.nombre || '').replace(/"/g, '&quot;').replace(/'/g, "\\'")
      const escapedUrlJs  = (p.imagen_url || '').replace(/'/g, "\\'")
      const precioTxt     = p.precio ? (isNaN(p.precio) ? p.precio : `$${Number(p.precio).toLocaleString('es-AR')}`) : 'Consultar'
      const enCarrito     = CARRITO.some(x => x.id === p.id)

      const imgHTML = p.imagen_url
        ? `<div class="tarjeta-img" onclick="abrirFoto('${escapedUrlJs}','${escapedNombre}')">
            <img class="img-prod" src="${escapedUrl}" alt="${escapedNombre}" onerror="this.style.display='none'">
            ${p.codigo ? `<span class="tarjeta-codigo">${p.codigo}</span>` : ''}
           </div>`
        : `<div class="tarjeta-img">
            <span style="font-size:2.8rem;opacity:.4">⬡</span>
            ${p.codigo ? `<span class="tarjeta-codigo">${p.codigo}</span>` : ''}
           </div>`

      const card = document.createElement('div')
      card.className = 'tarjeta'
      card.innerHTML = `
        ${imgHTML}
        <div class="tarjeta-body">
          ${p.categoria ? `<span class="tarjeta-cat">${p.categoria}</span>` : ''}
          <div class="tarjeta-nombre">${p.nombre}</div>
          ${p.descripcion ? `<div class="tarjeta-desc">${p.descripcion}</div>` : '<div class="tarjeta-desc"></div>'}
          <div class="tarjeta-precio${precioTxt === 'Consultar' ? ' consultar' : ''}">${precioTxt}</div>
          <button id="btn-car-${p.id}"
            class="btn-add${enCarrito ? ' added' : ''}"
            onclick="agregarCarrito('${p.id}','${escapedNombre}','${(p.categoria||'').replace(/'/g,"\\'")}')">
            ${enCarrito
              ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg> Agregado'
              : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Agregar al presupuesto'}
          </button>
        </div>`
      grid.appendChild(card)
    })
  }

  function abrirFoto(url, nombre) {
    document.getElementById('modalFotoImg').src = url
    document.getElementById('modalFotoNombre').textContent = nombre
    document.getElementById('modalFoto').classList.add('activo')
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('modalFoto').classList.remove('activo')
      cerrarCarrito()
    }
  })

  function mostrarError() {
    document.getElementById('spinnerWrap').style.display = 'none'
    document.getElementById('estadoError').style.display = 'block'
  }

  // ── CARRITO ────────────────────────────────────────────
  function agregarCarrito(id, nombre, categoria) {
    const existe = CARRITO.find(x => x.id === id)
    if (existe) {
      existe.cantidad++
    } else {
      CARRITO.push({ id, nombre, categoria, cantidad: 1 })
    }
    actualizarFab()
    const btn = document.getElementById('btn-car-' + id)
    if (btn) {
      btn.classList.add('added')
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg> Agregado'
    }
  }

  function quitarCarrito(id) {
    CARRITO = CARRITO.filter(x => x.id !== id)
    actualizarFab()
    renderCarrito()
    // Restaurar botón en la tarjeta
    const btn = document.getElementById('btn-car-' + id)
    if (btn) { btn.classList.remove('added'); btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Agregar al presupuesto' }
  }

  function cambiarCantidad(id, delta) {
    const item = CARRITO.find(x => x.id === id)
    if (!item) return
    item.cantidad = Math.max(1, item.cantidad + delta)
    renderCarrito()
  }

  function actualizarFab() {
    const total = CARRITO.reduce((s, x) => s + x.cantidad, 0)
    const fab   = document.getElementById('carritoFab')
    fab.style.display = total > 0 ? 'flex' : 'none'
    document.getElementById('carritoBadge').textContent = total
  }

  function abrirCarrito()  { renderCarrito(); document.getElementById('modalCarrito').classList.add('activo') }
  function cerrarCarrito() { document.getElementById('modalCarrito').classList.remove('activo') }

  function renderCarrito() {
    const body   = document.getElementById('carritoBody')
    const footer = document.getElementById('carritoFooter')
    if (!CARRITO.length) {
      body.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#6b7a90">Tu pedido está vacío.<br>Agregá productos desde el catálogo.</div>'
      footer.innerHTML = ''
      return
    }
    body.innerHTML = CARRITO.map(x => `
      <div class="car-item">
        <div style="flex:1">
          <div class="car-item-nombre">${x.nombre}</div>
          ${x.categoria ? `<div class="car-item-cat">${x.categoria}</div>` : ''}
        </div>
        <div class="car-qty">
          <button onclick="cambiarCantidad('${x.id}',-1)">−</button>
          <span>${x.cantidad}</span>
          <button onclick="cambiarCantidad('${x.id}',1)">+</button>
        </div>
        <button class="car-del" onclick="quitarCarrito('${x.id}')">🗑️</button>
      </div>`).join('')

    footer.innerHTML = `
      <div class="form-ped">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label>Nombre *</label><input id="pedNombre" placeholder="Tu nombre"/></div>
          <div><label>Teléfono *</label><input id="pedTel" placeholder="Tu teléfono"/></div>
        </div>
        <label>Email</label><input id="pedEmail" placeholder="tu@email.com" type="email"/>
        <label>Empresa / Institución</label><input id="pedEmpresa" placeholder="Opcional"/>
        <label>Mensaje adicional</label><input id="pedMensaje" placeholder="Opcional"/>
      </div>
      <button onclick="enviarPedido()" style="width:100%;padding:13px;background:var(--primario);color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:4px;font-family:'Inter',sans-serif">📩 Enviar pedido de presupuesto</button>`
  }

  async function enviarPedido() {
    const nombre = document.getElementById('pedNombre').value.trim()
    const tel    = document.getElementById('pedTel').value.trim()
    if (!nombre || !tel) { alert('Nombre y teléfono son obligatorios'); return }

    const pedido = {
      empresa_id:       EMPRESA_DATA.id,
      nombre_cliente:   nombre,
      telefono_cliente: tel,
      email_cliente:    document.getElementById('pedEmail').value.trim(),
      empresa_cliente:  document.getElementById('pedEmpresa').value.trim(),
      mensaje:          document.getElementById('pedMensaje').value.trim(),
      productos:        CARRITO.map(x => ({ id: x.id, nombre: x.nombre, cantidad: x.cantidad })),
    }

    const { error } = await db.from('pedidos').insert(pedido)
    if (error) { alert('Error al enviar el pedido. Intentá de nuevo.'); return }

    const lista = CARRITO.map(x => `• ${x.cantidad}x ${x.nombre}`).join('\n')
    const texto = `Hola! Soy ${nombre} (${tel}). Solicito presupuesto de:\n\n${lista}${pedido.mensaje ? '\n\nMensaje: ' + pedido.mensaje : ''}`

    if (EMPRESA_DATA.whatsapp) window.open(`https://wa.me/${EMPRESA_DATA.whatsapp}?text=${encodeURIComponent(texto)}`, '_blank')
    if (EMPRESA_DATA.email_contacto) window.open(`mailto:${EMPRESA_DATA.email_contacto}?subject=${encodeURIComponent('Solicitud de presupuesto de ' + nombre)}&body=${encodeURIComponent(texto)}`, '_blank')

    CARRITO = []
    actualizarFab()
    cerrarCarrito()
    alert('✅ ¡Pedido enviado! Nos pondremos en contacto pronto.')
  }

  init()
</script>
</body>
</html>
